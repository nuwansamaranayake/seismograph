# Host ports are parameterized (env vars with defaults) so the stack can coexist with
# other local Postgres/Redis instances — override DB_HOST_PORT / REDIS_HOST_PORT if 5432/6379
# are taken.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aignite
      POSTGRES_PASSWORD: aignite
      POSTGRES_DB: seismograph
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aignite -d seismograph"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  service:
    build: .
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://aignite:aignite@db:5432/seismograph
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  dbdata:
