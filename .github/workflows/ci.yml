name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install groundwork + app
        run: |
          python -m pip install --upgrade pip
          # groundwork resolves from a published wheel / git ref once the repos are pushed.
          pip install "aignite-groundwork @ git+https://github.com/AiGNITE/groundwork@main" \
            || echo "groundwork not yet published; falling back to minimal runtime deps"
          pip install -e ".[dev]" \
            || pip install fastapi "uvicorn[standard]" httpx pydantic pydantic-settings pytest
      - run: pytest

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env for compose (gitignored; CI uses the committed example)
        run: cp .env.example .env
      - name: Bring up the stack
        run: docker compose up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          echo "service did not become healthy" && docker compose logs && exit 1
      - name: Smoke against a real business endpoint
        run: |
          pip install httpx
          # token must match SMOKE_TEST_TOKEN in .env.example (the container's env in CI)
          API_HOST=127.0.0.1 API_PORT=8000 SMOKE_TEST_TOKEN=dev-smoke-token python scripts/smoke_test.py
      - name: Teardown
        if: always()
        run: docker compose down -v

  eval:
    name: "eval (required)"
    runs-on: ubuntu-latest
    # Golden-defect suite against the EVAL.md thresholds. Deterministic (fixed seeds,
    # hashing embedder), keyless, and REQUIRED: a miss on any bound fails the build.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "pydantic>=2" pyyaml httpx
      - run: python scripts/eval.py
